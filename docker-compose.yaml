name: tflive-compose
services:
  app-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tflive
      POSTGRES_PASSWORD: tflive
      POSTGRES_DB: tflive_test
    ports:
      - "55432:5432"
    volumes:
      - app-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tflive -d tflive_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER:?set KEYCLOAK_DB_USER in .env}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD in .env}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:?set KEYCLOAK_DB_NAME in .env}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:?set KEYCLOAK_DB_USER in .env} -d ${KEYCLOAK_DB_NAME:?set KEYCLOAK_DB_NAME in .env}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    command: start-dev
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB_NAME:?set KEYCLOAK_DB_NAME in .env}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:?set KEYCLOAK_DB_USER in .env}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD in .env}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:?set KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME in .env}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:?set KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD in .env}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8082:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          { printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0;
          grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  keycloak-provision:
    build:
      context: .
      dockerfile: Dockerfile.keycloak-provisioner
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_REALM: master
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:?set KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME in .env}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:?set KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD in .env}
      KEYCLOAK_REALM: tflive
      KEYCLOAK_WEB_CLIENT_ID: tflive-web
      KEYCLOAK_API_CLIENT_ID: tflive-api
      KEYCLOAK_WEB_REDIRECT_URIS: ${KEYCLOAK_WEB_REDIRECT_URIS:?set KEYCLOAK_WEB_REDIRECT_URIS in .env}
      KEYCLOAK_WEB_ORIGINS: ${KEYCLOAK_WEB_ORIGINS:?set KEYCLOAK_WEB_ORIGINS in .env}
      KEYCLOAK_PLATFORM_ADMIN_USERNAME: ${KEYCLOAK_PLATFORM_ADMIN_USERNAME:?set KEYCLOAK_PLATFORM_ADMIN_USERNAME in .env}
      KEYCLOAK_PLATFORM_ADMIN_PASSWORD: ${KEYCLOAK_PLATFORM_ADMIN_PASSWORD:?set KEYCLOAK_PLATFORM_ADMIN_PASSWORD in .env}
      KEYCLOAK_PLATFORM_ADMIN_EMAIL: ${KEYCLOAK_PLATFORM_ADMIN_EMAIL:?set KEYCLOAK_PLATFORM_ADMIN_EMAIL in .env}
      KEYCLOAK_PLATFORM_ADMIN_FIRST_NAME: ${KEYCLOAK_PLATFORM_ADMIN_FIRST_NAME:?set KEYCLOAK_PLATFORM_ADMIN_FIRST_NAME in .env}
      KEYCLOAK_PLATFORM_ADMIN_LAST_NAME: ${KEYCLOAK_PLATFORM_ADMIN_LAST_NAME:?set KEYCLOAK_PLATFORM_ADMIN_LAST_NAME in .env}
      KEYCLOAK_HTTP_TIMEOUT: 10s
      KEYCLOAK_DIRECTORY_READER_CLIENT_SECRET: ${KEYCLOAK_DIRECTORY_READER_CLIENT_SECRET:?set KEYCLOAK_DIRECTORY_READER_CLIENT_SECRET in .env}
      TFLIVE_ENVIRONMENT: ${TFLIVE_ENVIRONMENT:-development}
    restart: "no"

  openfga-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${OPENFGA_DB_USER:?set OPENFGA_DB_USER in .env}
      POSTGRES_PASSWORD: ${OPENFGA_DB_PASSWORD:?set OPENFGA_DB_PASSWORD in .env}
      POSTGRES_DB: ${OPENFGA_DB_NAME:?set OPENFGA_DB_NAME in .env}
    volumes:
      - openfga-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPENFGA_DB_USER:?set OPENFGA_DB_USER in .env} -d ${OPENFGA_DB_NAME:?set OPENFGA_DB_NAME in .env}"]
      interval: 5s
      timeout: 5s
      retries: 10

  openfga-migrate:
    image: openfga/openfga:v1.15.1
    command: migrate
    depends_on:
      openfga-postgres:
        condition: service_healthy
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${OPENFGA_DB_USER:?set OPENFGA_DB_USER in .env}:${OPENFGA_DB_PASSWORD:?set OPENFGA_DB_PASSWORD in .env}@openfga-postgres:5432/${OPENFGA_DB_NAME:?set OPENFGA_DB_NAME in .env}?sslmode=disable
    restart: "no"

  openfga:
    image: openfga/openfga:v1.15.1
    command: run
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${OPENFGA_DB_USER:?set OPENFGA_DB_USER in .env}:${OPENFGA_DB_PASSWORD:?set OPENFGA_DB_PASSWORD in .env}@openfga-postgres:5432/${OPENFGA_DB_NAME:?set OPENFGA_DB_NAME in .env}?sslmode=disable
      OPENFGA_LOG_FORMAT: json
      OPENFGA_PLAYGROUND_ENABLED: "false"
    ports:
      - "8083:8080"
      - "8084:8081"
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  openfga-provision:
    build:
      context: .
      dockerfile: Dockerfile.openfga-provisioner
    command: ["verify"]
    depends_on:
      openfga:
        condition: service_healthy
    environment:
      OPENFGA_API_URL: http://openfga:8080
      OPENFGA_STORE_NAME: tflive
      OPENFGA_STORE_ID: ${OPENFGA_STORE_ID:-}
      OPENFGA_MODEL_ID: ${OPENFGA_MODEL_ID:-}
      OPENFGA_HTTP_TIMEOUT: ${OPENFGA_HTTP_TIMEOUT:-10s}
      OPENFGA_API_TOKEN: ${OPENFGA_API_TOKEN:-}
    restart: "no"

  temporal-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.28.1
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.49.1
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://localhost:8080
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tflive}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tflive-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-tflive} ${MINIO_ROOT_PASSWORD:-tflive-secret}; do
        sleep 1;
      done;
      mc mb --ignore-existing local/${S3_BUCKET:-tflive-artifacts}
      "

volumes:
  app-postgres-data:
  keycloak-postgres-data:
  openfga-postgres-data:
  temporal-postgres-data:
  minio-data:
